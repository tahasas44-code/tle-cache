name: Update TLE

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Fetch TLE
        run: |
          curl -s "https://celestrak.org/NORAD/elements/gp.php?GROUP=stations&FORMAT=tle" > tle.txt
          curl -s "https://celestrak.org/NORAD/elements/gp.php?GROUP=weather&FORMAT=tle" >> tle.txt
          curl -s "https://celestrak.org/NORAD/elements/gp.php?GROUP=amateur&FORMAT=tle" >> tle.txt

      - name: Commit TLE
        run: |
          git config --global user.name "TLE Bot"
          git config --global user.email "bot@example.com"
          git add tle.txt
          git commit -m "Update TLE" || echo "No changes"
          git push
